<ion-header>
  <ion-toolbar class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="assets/icon/Logo.png" alt="logo" />
        <span>Arte y Diseño</span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="login-page">
  <section class="login-hero">
    <h2>Inicia sesión con tu cuenta</h2>
    <p class="subtitle">Descubre nuestras creaciones únicas, cada una con su propia personalidad y encanto</p>
  </section>

  <section class="login-form">
    <!-- Mensaje de éxito -->
    <div class="alert alert-success" *ngIf="success">
      <ion-icon name="checkmark-circle"></ion-icon>
      <span>¡Login exitoso! Redirigiendo...</span>
    </div>

    <!-- Mensaje de error -->
    <div class="alert alert-error" *ngIf="error">
      <ion-icon name="alert-circle"></ion-icon>
      <span>{{ error }}</span>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email:</label>
      <ion-input 
        [(ngModel)]="email" 
        placeholder="tu@email.com" 
        type="email"
        class="input"
        [disabled]="loading">
      </ion-input>
    </div>

    <!-- Contraseña -->
    <div class="form-group">
      <label>Contraseña:</label>
      <ion-input 
        [(ngModel)]="password" 
        type="password" 
        placeholder="Mínimo 6 caracteres"
        class="input"
        [disabled]="loading">
      </ion-input>
    </div>

    <!-- Botones de acción -->
    <div class="actions">
      <ion-button 
        (click)="submit()" 
        class="btn-primary"
        [disabled]="loading || !email || !password">
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </ion-button>
    </div>

    <!-- Enlace a registro -->
    <div class="form-footer">
      <p>¿No tienes cuenta? <a (click)="goToRegister()" class="link">Regístrate aquí</a></p>
      <p><a routerLink="/forgot-password" class="link">¿Olvidaste tu contraseña?</a></p>
    </div>
  </section>
  
</ion-content>
