<ion-header>
  <ion-toolbar class="topbar">
    <div class="topbar-inner">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/login"></ion-back-button>
      </ion-buttons>
      <div class="brand">
        <img src="assets/icon/Logo.png" alt="logo" />
        <span>Arte y Diseño</span>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="forgot-password-page">
  <section class="forgot-hero">
    <h2>Restablecer tu contraseña</h2>
    <p class="subtitle">Recupera el acceso a tu cuenta de Arte y Diseño en solo unos pasos</p>
  </section>

  <section class="forgot-form">
    <!-- Mensaje de éxito -->
    <div class="alert alert-success" *ngIf="success">
      <ion-icon name="checkmark-circle"></ion-icon>
      <span>¡Contraseña restablecida! Redirigiendo al login...</span>
    </div>

    <!-- Mensaje de error -->
    <div class="alert alert-error" *ngIf="error">
      <ion-icon name="alert-circle"></ion-icon>
      <span>{{ error }}</span>
    </div>

    <form (ngSubmit)="resetPassword()">
      <!-- Email -->
      <div class="form-group">
        <label>Email:</label>
        <ion-input 
          [(ngModel)]="email" 
          name="email"
          placeholder="tu@email.com" 
          type="email"
          class="input"
          [disabled]="loading">
        </ion-input>
      </div>

      <!-- Nueva Contraseña -->
      <div class="form-group">
        <label>Nueva Contraseña:</label>
        <ion-input 
          [(ngModel)]="newPassword" 
          name="newPassword"
          type="password" 
          placeholder="Mínimo 6 caracteres"
          class="input"
          [disabled]="loading">
        </ion-input>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="form-group">
        <label>Confirmar Contraseña:</label>
        <ion-input 
          [(ngModel)]="confirmPassword" 
          name="confirmPassword"
          type="password" 
          placeholder="Repite tu nueva contraseña"
          class="input"
          [disabled]="loading">
        </ion-input>
      </div>

      <!-- Botones de acción -->
      <div class="actions">
        <ion-button 
          type="submit" 
          class="btn-primary"
          [disabled]="loading || !email || !newPassword || !confirmPassword">
          <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
          {{ loading ? 'Procesando...' : 'Restablecer Contraseña' }}
        </ion-button>
      </div>

      <!-- Enlace a login -->
      <div class="form-footer">
        <p>¿Recordaste tu contraseña? <a routerLink="/login" class="link">Inicia sesión</a></p>
      </div>
    </form>
  </section>
</ion-content>
